services:
  - type: web
    name: a2a-firewall-backend
    env: docker
    repo: https://github.com/mananjp/a2a-firewall
    branch: main
    dockerfilePath: ./docker/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: a2a-firewall-db
          property: connectionString
      - key: GROQ_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: API_KEY_SALT
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://a2a-firewall-frontend.onrender.com
      - key: OTEL_SDK_DISABLED
        value: "true"
      - key: RATE_LIMIT_ENABLED
        value: "true"
      - key: DEBUG
        value: "false"

  - type: web
    name: a2a-firewall-frontend
    env: docker
    repo: https://github.com/mananjp/a2a-firewall
    branch: main
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    plan: free
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://a2a-firewall-backend.onrender.com
      - key: NODE_ENV
        value: production

databases:
  - name: a2a-firewall-db
    databaseName: a2afirewall
    user: a2a
    plan: free

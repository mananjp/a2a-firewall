version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: a2a_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-a2a}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-a2apassword}
      POSTGRES_DB: ${POSTGRES_DB:-a2afirewall}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-a2a} -d ${POSTGRES_DB:-a2afirewall}"]
      interval: 10s
      timeout: 5s
      retries: 5

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: a2a_jaeger
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"   # Jaeger UI
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:16686/ 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile
    container_name: a2a_backend
    restart: unless-stopped
    env_file: ./backend/.env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      jaeger:
        condition: service_started
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4318"

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
    container_name: a2a_frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    environment:
      VITE_API_URL: "http://localhost:8000"
    depends_on:
      backend:
        condition: service_started

volumes:
  pgdata:
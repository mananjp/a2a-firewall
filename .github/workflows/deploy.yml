name: Deploy

on:
  workflow_run:
    workflows: ["Test"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
      || github.event_name == 'workflow_dispatch'
    environment: production
    steps:
      - name: Deploy backend to Render
        run: |
          if [ -n "${{ secrets.RENDER_BACKEND_HOOK }}" ]; then
            curl -sf -X POST "${{ secrets.RENDER_BACKEND_HOOK }}" && \
              echo "backend deploy triggered" || echo "backend deploy hook failed"
          else
            echo "RENDER_BACKEND_HOOK not set — skipping backend deploy"
          fi

      - name: Deploy frontend to Render
        run: |
          if [ -n "${{ secrets.RENDER_FRONTEND_HOOK }}" ]; then
            curl -sf -X POST "${{ secrets.RENDER_FRONTEND_HOOK }}" && \
              echo "frontend deploy triggered" || echo "frontend deploy hook failed"
          else
            echo "RENDER_FRONTEND_HOOK not set — skipping frontend deploy"
          fi

      - name: Wait for backend health
        run: |
          if [ -z "${{ secrets.RENDER_BACKEND_URL }}" ]; then
            echo "RENDER_BACKEND_URL not set — skipping health check"
            exit 0
          fi
          for i in {1..60}; do
            if curl -sf "${{ secrets.RENDER_BACKEND_URL }}/health" >/dev/null 2>&1; then
              echo "backend healthy"; exit 0
            fi
            sleep 5
          done
          echo "backend failed to start in 5 minutes" >&2
          exit 1

      - name: Summary
        run: |
          echo "Deploy triggered successfully."
          echo "Backend: ${{ secrets.RENDER_BACKEND_URL || 'not configured' }}"
          echo "Frontend: ${{ secrets.RENDER_FRONTEND_URL || 'not configured' }}"

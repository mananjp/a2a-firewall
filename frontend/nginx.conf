server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # SPA: send unmatched routes to index.html so react-router can handle them.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Cache hashed JS/CSS aggressively.
  location ~* \.(?:js|css|woff2?|ttf|svg|png|jpg|jpeg|gif|ico)$ {
    expires 30d;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Don't cache index.html so deploys take effect immediately.
  location = /index.html {
    add_header Cache-Control "no-cache";
  }
}